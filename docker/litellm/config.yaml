model_list:
  # Без фильтрации — для сравнения
  - model_name: llama3.2
    litellm_params:
      model: ollama_chat/llama3.2
      api_base: http://ollama:11434

  # ПД заменяются на теги <ENTITY_TYPE> перед отправкой в LLM
  - model_name: llama3.2-mask
    litellm_params:
      model: ollama_chat/llama3.2
      api_base: http://ollama:11434

  # Запрос блокируется (HTTP 400) если обнаружены ПД
  - model_name: llama3.2-block
    litellm_params:
      model: ollama_chat/llama3.2
      api_base: http://ollama:11434

litellm_settings:
  # Кастомный guardrail — читает имя модели и вызывает pii-service
  callbacks: ["pii_guardrail.guardrail"]

  # Увеличенный таймаут: spaCy инференс + HTTP-вызов к pii-service
  request_timeout: 60

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
